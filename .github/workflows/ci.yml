name: "Hardware CI"

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "*.kicad_sch"
      - "*.kicad_pcb"
      - "*.kibot.yaml"
      - "site/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "*.kicad_sch"
      - "*.kicad_pcb"

permissions:
  contents: write

jobs:
  site:
    uses: laenzlinger/hugo-kicad-site/.github/workflows/kicad-site.yml@main
    with:
      project_name: "pedalboard-display"
      schematic: "pedalboard-display.kicad_sch"
      pcb: "pedalboard-display.kicad_pcb"
      kibot_config: "pedalboard-display.kibot.yaml"
      site_base_url: "https://pedalboard.github.io/pedalboard-display"
